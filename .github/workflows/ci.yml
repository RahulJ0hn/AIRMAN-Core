name: AIRMAN Core — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────
  # Backend: Lint + Unit Tests + Build
  # ─────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: airman
          POSTGRES_PASSWORD: airman_secret
          POSTGRES_DB: airman_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test DB
        env:
          DATABASE_URL: postgresql://airman:airman_secret@localhost:5432/airman_test
        run: npx prisma db push --accept-data-loss

      - name: Lint
        run: npm run lint

      - name: Unit tests
        env:
          DATABASE_URL: postgresql://airman:airman_secret@localhost:5432/airman_test
          JWT_SECRET: ci_test_jwt_secret
          JWT_EXPIRES_IN: 1h
          NODE_ENV: test
        run: npm run test:unit

      - name: Integration tests
        env:
          DATABASE_URL: postgresql://airman:airman_secret@localhost:5432/airman_test
          JWT_SECRET: ci_test_jwt_secret
          JWT_EXPIRES_IN: 1h
          NODE_ENV: test
        run: npm run test:integration

      - name: Build TypeScript
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ─────────────────────────────────────────────────────
  # Frontend: Lint + Build
  # ─────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: http://localhost:4000/api
        run: npm run build

  # ─────────────────────────────────────────────────────
  # Docker Compose smoke test (optional, on main)
  # ─────────────────────────────────────────────────────
  docker-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Build & start services
        run: docker compose up --build -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Backend health check timed out"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
