services:
  postgres:
    image: postgres:16-alpine
    container_name: airman_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airman_secret}
      POSTGRES_DB: ${POSTGRES_DB:-airman_core}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airman} -d ${POSTGRES_DB:-airman_core}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airman_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-airman}:${POSTGRES_PASSWORD:-airman_secret}@postgres:5432/${POSTGRES_DB:-airman_core}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "4000:4000"
    command: >
      sh -c "npx prisma db push --accept-data-loss && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: airman_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    ports:
      - "5173:80"

volumes:
  postgres_data:
